<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘 수업</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --border: #e8e6e0;
  --text: #1a1a1a;
  --text2: #666;
  --text3: #aaa;
  --accent: #2d6a4f;
  --accent2: #52b788;
  --warn: #e07c24;
  --danger: #c1121f;
  --info: #1d6fa4;
  --empty: #e8e6e0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 24px 16px 48px;
}

/* 헤더 */
.header {
  margin-bottom: 28px;
}
.header-top {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 4px;
}
.date-label {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.date-main {
  font-size: 22px;
  font-weight: 900;
  color: var(--text);
  line-height: 1;
}
.date-sub {
  font-size: 13px;
  color: var(--text2);
  font-weight: 400;
}
.update-time {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  margin-top: 6px;
}

/* 로딩 */
.loading {
  text-align: center;
  padding: 60px 24px;
  color: var(--text3);
  font-size: 13px;
}
.loading-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent2);
  margin: 0 3px;
  animation: bounce 1.2s infinite;
}
.loading-dot:nth-child(2) { animation-delay: .2s; }
.loading-dot:nth-child(3) { animation-delay: .4s; }
@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: .4; }
  40% { transform: translateY(-6px); opacity: 1; }
}

/* 교시 카드 */
.period-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.period-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: all .2s;
  animation: fadeUp .3s ease both;
}
.period-card:nth-child(1) { animation-delay: .05s; }
.period-card:nth-child(2) { animation-delay: .1s; }
.period-card:nth-child(3) { animation-delay: .15s; }
.period-card:nth-child(4) { animation-delay: .2s; }
.period-card:nth-child(5) { animation-delay: .25s; }
.period-card:nth-child(6) { animation-delay: .3s; }
.period-card:nth-child(7) { animation-delay: .35s; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.period-card.has-class {
  border-left: 3px solid var(--accent2);
}
.period-card.empty {
  opacity: .55;
}

/* 교시 번호 */
.period-num {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  width: 28px;
  flex-shrink: 0;
  text-align: center;
}
.period-card.has-class .period-num {
  color: var(--accent);
}

/* 구분선 */
.period-divider {
  width: 1px;
  height: 32px;
  background: var(--border);
  flex-shrink: 0;
}

/* 수업 내용 */
.period-body {
  flex: 1;
  min-width: 0;
}

.class-info {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.class-badge {
  font-size: 12px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 6px;
  background: #e8f5ee;
  color: var(--accent);
  flex-shrink: 0;
  font-family: 'Space Mono', monospace;
}

.class-topic {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
}

.class-step {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  flex-shrink: 0;
}

.empty-label {
  font-size: 13px;
  color: var(--text3);
  font-style: italic;
}

/* 에러 */
.error-box {
  background: #fff3f3;
  border: 1px solid #ffc9c9;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  font-size: 13px;
  color: var(--danger);
}

/* 새로고침 버튼 */
.refresh-btn {
  display: block;
  margin: 20px auto 0;
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 20px;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all .2s;
}
.refresh-btn:hover {
  border-color: var(--accent2);
  color: var(--accent);
}
</style>
</head>
<body>

<div class="header">
  <div class="date-label">TODAY</div>
  <div class="header-top">
    <div class="date-main" id="dateMain">--</div>
    <div class="date-sub" id="dateSub">--</div>
  </div>
  <div class="update-time" id="updateTime"></div>
</div>

<div id="content">
  <div class="loading">
    <div style="margin-bottom:12px">
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
    </div>
    데이터 불러오는 중
  </div>
</div>

<button class="refresh-btn" onclick="loadData()">↻ 새로고침</button>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbzNZvlFIurdxcXR7B9KtadjH_4Q4rX1sIZY5kFrcaYxg4H8CylH9jFui9KerKTLGiWd/exec';
const DOW = ['일','월','화','수','목','금','토'];

// 날짜 헤더 표시
function setDateHeader() {
  const now = new Date();
  const month = now.getMonth() + 1;
  const date = now.getDate();
  const day = DOW[now.getDay()];
  document.getElementById('dateMain').textContent = `${month}월 ${date}일`;
  document.getElementById('dateSub').textContent = `(${day})`;
  document.getElementById('updateTime').textContent =
    `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')} 기준`;
}

// 날짜 비교용 (YYYY-MM-DD)
function toDateStr(d) {
  if (!d) return '';
  const dt = new Date(d);
  // UTC 보정
  const kst = new Date(dt.getTime() + 9 * 60 * 60 * 1000);
  return kst.toISOString().split('T')[0];
}

function todayStr() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
}

// 진도표에서 반별 현재 수업 내용 추출
function buildProgressMap(progress) {
  const map = {};
  // 2행(index 2)부터 반 데이터 시작
  for (let i = 2; i < progress.length; i++) {
    const row = progress[i];
    const classId = String(row[1] || '').trim();
    if (!classId || classId === '이번 주' || classId === '날짜') continue;

    const topic = String(row[2] || '').trim();
    const step = row[10]; // 현재차시

    if (topic && classId) {
      map[classId] = { topic, step };
    }
  }
  return map;
}

// 시간표에서 오늘 수업 추출
function getTodaySchedule(timetable) {
  const today = todayStr();
  const schedule = {}; // { 교시: 반 }

  // 헤더 행에서 오늘 열 인덱스 찾기
  const dateRow = timetable[1]; // ["날짜", 월날짜, 화날짜, ...]
  let todayColIdx = -1;

  for (let c = 1; c < dateRow.length; c++) {
    const cellDate = toDateStr(dateRow[c]);
    if (cellDate === today) {
      todayColIdx = c;
      break;
    }
  }

  if (todayColIdx === -1) return null; // 오늘 수업 없음(주말/휴일)

  // 교시별 반 추출 (3행부터)
  for (let r = 2; r < timetable.length; r++) {
    const row = timetable[r];
    const period = row[0]; // 1~7
    const classCell = String(row[todayColIdx] || '').trim();
    if (typeof period === 'number' && period >= 1 && period <= 7) {
      schedule[period] = classCell || '';
    }
  }

  return schedule;
}

async function loadData() {
  setDateHeader();
  document.getElementById('content').innerHTML = `
    <div class="loading">
      <div style="margin-bottom:12px">
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>
      데이터 불러오는 중
    </div>`;

  try {
    const res = await fetch(GAS);
    const json = await res.json();
    const { progress, timetable } = json;

    const progressMap = buildProgressMap(progress);
    const schedule = getTodaySchedule(timetable);

    if (!schedule) {
      document.getElementById('content').innerHTML = `
        <div class="error-box">
          오늘은 수업이 없는 날이에요 🎉
        </div>`;
      return;
    }

    // 오늘 요일에 따라 최대 교시 결정
    const today = new Date();
    const dow = today.getDay(); // 0=일, 2=화, 4=목
    const maxPeriod = (dow === 2 || dow === 4) ? 7 : 6;

    let html = '<div class="period-list">';

    for (let p = 1; p <= maxPeriod; p++) {
      const classId = schedule[p] || '';
      const hasClass = classId !== '';

      if (hasClass) {
        // 진도표에서 수업 내용 찾기
        const info = progressMap[classId] || {};
        const topic = info.topic || '수업 내용 확인 필요';
        const step = info.step ? `${info.step}차시` : '';

        html += `
          <div class="period-card has-class">
            <div class="period-num">${p}교시</div>
            <div class="period-divider"></div>
            <div class="period-body">
              <div class="class-info">
                <span class="class-badge">${classId}</span>
                <span class="class-topic">${topic}</span>
                ${step ? `<span class="class-step">${step}</span>` : ''}
              </div>
            </div>
          </div>`;
      } else {
        html += `
          <div class="period-card empty">
            <div class="period-num">${p}교시</div>
            <div class="period-divider"></div>
            <div class="period-body">
              <span class="empty-label">공강</span>
            </div>
          </div>`;
      }
    }

    html += '</div>';
    document.getElementById('content').innerHTML = html;

  } catch (e) {
    document.getElementById('content').innerHTML = `
      <div class="error-box">
        데이터를 불러오지 못했어요<br>
        <span style="font-size:11px;margin-top:4px;display:block">${e.message}</span>
      </div>`;
  }
}

loadData();
</script>
</body>
</html>
