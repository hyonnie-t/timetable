<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>시간표</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ============================================================
     로그인 화면
     ============================================================ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Timetable</div>
    <div class="login-title">내 수업 관리</div>
    <div class="login-sub">교사용 시간표 · 진도 관리 도구</div>
    <button class="btn-google" onclick="window.handleSignIn()">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/>
      </svg>
      Google로 로그인
    </button>
  </div>
</div>

<!-- ============================================================
     앱 화면
     ============================================================ -->
<div id="app-screen" style="display:none">

  <div class="tabs">
    <button class="tab active" data-tab="today"    onclick="window.switchTab('today')">오늘 수업</button>
    <button class="tab"        data-tab="weekly"   onclick="window.switchTab('weekly')">주차별</button>
    <button class="tab"        data-tab="progress" onclick="window.switchTab('progress')">진도표</button>
    <button class="settings-tab-btn" data-tab="settings" onclick="window.switchTab('settings')">⚙</button>
  </div>

  <div id="tab-today"></div>
  <div id="tab-weekly"   style="display:none"></div>
  <div id="tab-progress" style="display:none"></div>
  <div id="tab-settings" style="display:none"></div>

</div>

<div class="toast" id="toast"></div>

<script type="module" src="app.js"></script>
</body>
</html>
